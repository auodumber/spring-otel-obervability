# prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:

  # Scrape the metrics Prometheus exporter exposed by the OTel Collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9464']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Scrape the OTel Collector's own internal metrics (pipeline health)
  - job_name: 'otel-collector-internal'
    static_configs:
      - targets: ['otel-collector:8888']

  # Direct scrape of the app's /actuator/prometheus (classic pull mode).
  # Useful as a fallback if the OTLP push pipeline is misconfigured.
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8080']
